# ─────────────────────────────────────────────────────────────────────────────
# DEVELOPMENT stack (local only). Exposes phpMyAdmin (8081) + the DB port (3307)
# and bind-mounts the source for live editing — convenient locally, NOT safe for
# production. For a live domain use:  docker compose -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────────────────────────
version: "3.8"

services:
  web:
    build: .
    container_name: lms_web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      DB_HOST: db
      DB_NAME: library_sys
      DB_USER: ${DB_USER:-lms_user}
      DB_PASS: ${DB_PASS:-lms_pass}
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: lms_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: library_sys
      MYSQL_USER: ${DB_USER:-lms_user}
      MYSQL_PASSWORD: ${DB_PASS:-lms_pass}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Auto-loads catalog/users on a FRESH database only (e.g. a new laptop).
      # Ignored when db_data already has data — never clobbers existing data.
      - ./deploy/seed.sql:/docker-entrypoint-initdb.d/01-seed.sql:ro

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: lms_phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    depends_on:
      - db

volumes:
  db_data: