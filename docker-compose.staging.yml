# ─────────────────────────────────────────────────────────────────────────────
#  STAGING — public HTTPS in one command, for stress testing before production.
#
#  Caddy auto-provisions a Let's Encrypt cert for SITE_ADDRESS and reverse-proxies
#  to the app; MySQL and uploads persist in named volumes (named volumes inherit the
#  image's www-data ownership, avoiding the bind-mount permission pitfall). Secrets
#  are REQUIRED — an unset value fails the command instead of using a guessable default.
#
#  Run on any Docker host (a small 2 vCPU / 4 GB VPS is recommended for honest load
#  numbers — see docs/staging-deployment.md):
#
#    cp .env.example .env                       # set DB_PASS, MYSQL_ROOT_PASSWORD, SITE_ADDRESS
#    cp deploy/seed.sql.example deploy/seed.sql # schema-only bootstrap (no default admin)
#    docker compose -f docker-compose.staging.yml up -d --build
# ─────────────────────────────────────────────────────────────────────────────

services:
  caddy:
    image: caddy:2-alpine
    container_name: lms_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:?set SITE_ADDRESS in .env (your domain, or <vps-public-ip>.sslip.io)}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

  web:
    build: .
    image: lms_web:staging
    container_name: lms_web
    restart: unless-stopped
    expose:
      - "80"                         # internal only — Caddy terminates TLS in front
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME:-library_sys}
      DB_USER: ${DB_USER:?set DB_USER in .env}
      DB_PASS: ${DB_PASS:?set DB_PASS in .env}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-tls}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-SDO Quirino Library}
    volumes:
      - storage_data:/var/www/html/storage    # uploads, avatars, app logs (persisted)
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@file_get_contents('http://127.0.0.1/health.php')!==false?0:1);"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  db:
    image: mysql:8.0
    container_name: lms_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ${DB_NAME:-library_sys}
      MYSQL_USER: ${DB_USER:?set DB_USER in .env}
      MYSQL_PASSWORD: ${DB_PASS:?set DB_PASS in .env}
    # No host port published — the DB is reachable only on the internal compose network.
    volumes:
      - db_data:/var/lib/mysql
      - ./deploy/seed.sql:/docker-entrypoint-initdb.d/01-seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

volumes:
  db_data:
  storage_data:
  caddy_data:
  caddy_config:
