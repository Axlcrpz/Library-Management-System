name: Secret scan

# Fails the build if any credential/secret is detected in the working tree OR in
# git history. Make this a required status check before merging or publishing.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so past commits are scanned too

      - name: Run gitleaks (redacted)
        run: |
          VER=8.18.4
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          # --redact: never print secret values in CI logs. --exit-code 1: fail on findings.
          ./gitleaks detect --source . --redact --no-banner --exit-code 1
